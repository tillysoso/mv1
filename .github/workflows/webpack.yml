name: Build
name: NodeJS with Webpack
name: Build
name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
  check:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
        node-version: [20.x, 22.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    - name: Build
      run: |
        npm install
        npm run build:web
        npx webpack
        npm run build:web
    - name: Install dependencies
      run: npm install

    - name: TypeScript type check
      run: npx tsc --noEmit

    - name: Run tests
      run: node --test src/features/birth-card/birthCardCalculator.test.mjs
